<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropHive - Register</title>
  <script src="/JavaScript/config.js"></script>
  <script src="/JavaScript/login/register.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/loading.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/alert.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/prompt.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/successful.js"></script>
  <link rel="stylesheet" href="/CSS/register.css">
</head>
<body>
  <loading-modal id="loading">Enviando correo de verificación</loading-modal>
  <alert-message id="alert-error" type="error"></alert-message>
  <alert-message id="alert-success" type="success"></alert-message>
  <successful-modal id="success-modal"></successful-modal>
  <prompt-modal id="prompt-modal"></prompt-modal>
  <div id="contenedor-principal">
    <div class="image-container">
      <img src="/Images/DropHive.png" alt="Logo">
    </div>
    <div>
      <div>
        <form id="registrationForm">
          <h3>¡REGISTRATE!</h3>
          <div id="contenedor-inputs">
            <div id="contenedor-izquierda">
              <input aria-label="Nombre de la empresa" type="text" placeholder="Company*" name="Company" id="company" required>
              <input aria-label="Correo electronica" id="email" type="email" name="email"  placeholder="Email*" required>
              <input aria-label="Contraseña" type="password" name="password" id="password" placeholder="Password*" required>
              <input aria-label="Repetir contraseña" type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password*" required>
            </div>
            <div id="linea-separacion"></div>
            <div id="contenedor-derecha">
              <input aria-label="Telefono" type="tel" name="phone" id="phone" placeholder="Phone(opcional)">
              <input aria-label="Dirección" type="text" name="direccion" id="direccion" placeholder="Dirección(opcional)">
              <textarea aria-label="Descripción de la empresa" name="descripcion" id="descripcion" placeholder="Descripción(opcional)"></textarea>
            </div>
          </div>

          <div id="contenedor-botones">
            <button id="submit" type="submit">Register</button>
            <button id="VolverLogin">¿Ya tienes cuenta? Inicia Sesión</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
