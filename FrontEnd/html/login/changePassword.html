<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropHive Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/JavaScript/webComponents/modals/alert.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/loading.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/prompt.js"></script>
  <script type="module" src="/JavaScript/webComponents/modals/changePassword.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-white font-sans">
  <alert-message id="alert-error" type="error"></alert-message>
  <prompt-modal id="prompt-modal"></prompt-modal>
  <change-password-modal id="changePassword"></change-password-modal>
  <loading-modal id="loading">Sending verification email</loading-modal>
  <div class="bg-[#ccc] p-10 rounded-lg shadow-lg text-center">
    <div class="mb-4">
      <img src="/Images/Logo_Drop_Hive.png" alt="Box Logo" class="w-72 h-48 mx-auto" />
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md mt-4">
      <h4>Reset your password</h4>
      <form id="LoginForm">
        <div class="flex items-center justify-between bg-white border border-gray-300 rounded p-2 mb-4">
          <label for="mail" class="w-1/3 text-right pr-3 text-base">Email:</label>
          <input
            type="email"
            id="mail"
            required
            class="w-2/3 p-2 outline-none"
          />
        </div>
        <div class="flex justify-center mt-4 space-x-4">
          <button
                  type="button"
                  onclick="window.history.back()"
                  class="bg-gray-400 text-white py-2 px-4 rounded hover:scale-105 transition-transform">
            Back
          </button>
          <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:scale-105 transition-transform">
            Enter
          </button>
        </div>
      </form>
    </div>
    <div id="message" class="mt-4 text-sm text-red-600"></div>
  </div>
</body>
</html>

<script>
  //TODO. Cambiar CSS de los botones
  document.getElementById("LoginForm").addEventListener("submit", async function (event) {
    event.preventDefault();
    const email = document.getElementById("mail").value;
    const alert = document.getElementById('alert-error');
    const loader = document.getElementById('loading');
    // TODO. cambiar y retornar 200 y que no se ha encontrado el correo
    const check_mail = await fetch(`http://127.0.0.1:4000/check_mail?mail=${email}`);
    if (!check_mail.ok) {
      alert.setMessage("The entered email is not registered");
      alert.show(2000);
      return
    }
    loader.show();
    const sendMailResponse = await fetch(`http://127.0.0.1:4000/send_verification_code?mail=${email}`);
    loader.hide();

    if (sendMailResponse.ok) {
      const prompt = document.getElementById('prompt-modal');
      let valid = false;
      while (!valid) {
        const verification_code = await prompt.show({
          title: 'Verification to reset password',
          text: 'The code has been sent to your email',
          placeholder: 'Verification code'
        });

        if (!verification_code || verification_code.trim() === '') {
          alert.setMessage("You must enter a verification code.");
          alert.show(2000);
          continue;
        }
        const response = await fetch('http://127.0.0.1:4000/check_verification_code', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({code: verification_code}),
        });

        if (response.ok) {
          valid = true
          const doublePrompt = document.getElementById('changePassword');
          let passwordSet = false;
          while (!passwordSet) {
            try {
              const newPassword = await doublePrompt.show();
              const responseChange = await fetch('http://127.0.0.1:4000/change_password', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  mail: email,
                  password: newPassword,
                })
              });
              if (responseChange.ok) {
                // TODO. mensaje de contraseña cambiada con exito
                window.location.href = 'http://127.0.0.1:4000/login';
                passwordSet = true;
              } else {
                alert.setMessage("There was an error changing the password. Please try again later.");
                alert.show(2000);
              }
            } catch (err) {
              if (err === 'mismatch') {
                alert.setMessage("The passwords do not match");
              } else if (err === 'empty') {
                alert.setMessage("Password fields cannot be empty");
              } else if (err === 'too_short') {
                alert.setMessage("Password must be longer than 8 characters");
              } else if (err === 'cancel') {
                break;
              } else {
                alert.setMessage("Unexpected error");
              }
              alert.show(2000);
            }
          }
        } else {
          alert.setMessage("The verification code is incorrect");
          alert.show(2000);
        }
      }
    } else {
      alert.setMessage("Could not send the verification email");
      alert.show(2000);
    }
  });
</script>
